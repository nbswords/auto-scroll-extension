<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <style>
    :root[data-theme="dark"] {
      --bg-primary: #17181c;
      --bg-secondary: #1e1f25;
      --bg-card: #26272e;
      --bg-card-hover: #2e3039;
      --text-primary: #e8e8eb;
      --text-secondary: #9ca0ab;
      --accent: #7c6df5;
      --accent-hover: #6b5ce6;
      --accent-glow: rgba(124, 109, 245, 0.18);
      --success: #34d399;
      --track: #2a2b33;
      --track-fill: #7c6df5;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: rgba(0, 0, 0, 0.4);
      --toggle-bg: #2a2b33;
      --toggle-knob: #e8e8eb;
    }

    :root[data-theme="light"] {
      --bg-primary: #f7f7f9;
      --bg-secondary: #ffffff;
      --bg-card: #eff0f4;
      --bg-card-hover: #e6e7ed;
      --text-primary: #1a1a2e;
      --text-secondary: #6b7084;
      --accent: #6c5ce7;
      --accent-hover: #5a4bd1;
      --accent-glow: rgba(108, 92, 231, 0.12);
      --success: #10b981;
      --track: #d8d9e0;
      --track-fill: #6c5ce7;
      --border: rgba(0, 0, 0, 0.07);
      --shadow: rgba(0, 0, 0, 0.06);
      --toggle-bg: #d8d9e0;
      --toggle-knob: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      padding: 24px;
      font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 .logo {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    /* Theme toggle */
    .theme-toggle {
      width: 48px;
      height: 26px;
      background: var(--toggle-bg);
      border-radius: 13px;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .theme-toggle .knob {
      width: 20px;
      height: 20px;
      background: var(--toggle-knob);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 3px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      box-shadow: 0 1px 4px var(--shadow);
    }

    [data-theme="light"] .theme-toggle .knob {
      transform: translateX(21px);
    }

    /* Control group */
    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .control-label span {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .control-label .value-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: var(--bg-card);
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      min-width: 44px;
      text-align: center;
    }

    /* Range slider */
    input[type="range"] {
      width: 100%;
      height: 5px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--track);
      border-radius: 4px;
      outline: none;
      transition: background 0.3s;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 3px var(--accent), 0 2px 8px var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 0 3px var(--accent), 0 0 12px var(--accent-glow);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.05);
    }

    /* Direction buttons */
    .direction-group {
      display: flex;
      gap: 8px;
    }

    .direction-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .direction-btn:hover {
      background: var(--bg-card-hover);
      border-color: rgba(124, 109, 245, 0.3);
    }

    .direction-btn.active {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    .direction-btn .arrow {
      font-size: 16px;
      line-height: 1;
    }

    /* Toggle button */
    #toggleBtn {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    #toggleBtn:hover {
      box-shadow: 0 6px 24px rgba(124, 109, 245, 0.35);
      transform: translateY(-1px);
    }

    #toggleBtn:active {
      transform: translateY(0);
    }

    #toggleBtn.running {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    #toggleBtn.running:hover {
      background: var(--accent-glow);
    }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: background 0.3s;
    }

    .status-bar.active .status-dot {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-bar.active {
      color: var(--success);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), var(--border), transparent);
      margin: 4px 0 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <div class="logo">&#8595;</div>
      Auto Scroll
    </h1>
    <div class="theme-toggle" id="themeToggle">
      <div class="knob" id="themeIcon">&#9790;</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <div class="control-label">
      <span>Scroll Speed</span>
      <span class="value-badge" id="speedValue">3</span>
    </div>
    <input type="range" id="speed" min="1" max="10" value="3">
  </div>

  <div class="control-group">
    <div class="control-label">
      <span>Distance (px)</span>
      <span class="value-badge" id="distanceValue">300</span>
    </div>
    <input type="range" id="distance" min="100" max="1000" step="50" value="300">
  </div>

  <div class="control-group">
    <div class="control-label">
      <span>Pause (sec)</span>
      <span class="value-badge" id="pauseValue">2.0</span>
    </div>
    <input type="range" id="pause" min="0.5" max="10" step="0.5" value="2">
  </div>

  <div class="control-group">
    <div class="control-label">
      <span>Direction</span>
    </div>
    <div class="direction-group">
      <button class="direction-btn active" data-dir="down">
        <span class="arrow">&#8595;</span> Down
      </button>
      <button class="direction-btn" data-dir="up">
        <span class="arrow">&#8593;</span> Up
      </button>
    </div>
  </div>

  <button id="toggleBtn">&#9654; Start Scrolling</button>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="status">Stopped</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
